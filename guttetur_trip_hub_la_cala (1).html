<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guttetur Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #f3f4f6;
      color: #1f2937;
      transition: all 0.3s;
    }
    .header-bg {
      background-image: url('https://a0.muscache.com/im/pictures/d2290384-93e0-45e1-9a3c-fc1651f4484d.jpg?im_w=1200');
      background-size: cover;
      background-position: center;
      padding: 1rem;
      border-radius: 1rem;
      color: white;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .overlay {
      background: rgba(255,255,255,0.9);
      padding: 1rem;
      border-radius: 1rem;
      margin-bottom: 1rem;
    }
    .dark .overlay {
      background: rgba(17,24,39,0.9);
      color: white;
    }
    .map-container {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 16:9 ratio */
      border-radius: 1rem;
      overflow: hidden;
      margin-bottom: 0.5rem;
    }
    .map-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>

<div class="max-w-2xl mx-auto mt-4">
  <div class="header-bg">
    <h1 class="text-3xl font-bold">☀️ Guttetur Hub</h1>
    <button id="handlelisteBtn" class="bg-yellow-500 text-white px-3 py-1 rounded w-full">Mat/drikke vi må ha 🛒</button>
  </div>

  <!-- Handleliste Popup -->
  <div id="handlelisteModal" class="fixed inset-0 bg-black bg-opacity-50 hidden justify-center items-center">
    <div class="bg-white dark:bg-gray-800 rounded-2xl p-4 max-w-md w-full">
      <h2 class="font-bold text-xl mb-2">Handleliste</h2>
      <div class="flex gap-2 mb-2">
        <input type="text" id="itemInput" class="flex-1 p-2 border rounded" placeholder="Legg til vare" />
        <button id="addItemBtn" class="bg-green-500 text-white px-3 py-1 rounded">Legg til</button>
      </div>
      <ul id="itemList" class="space-y-1 max-h-64 overflow-y-auto"></ul>
      <div class="mt-4 flex justify-end">
        <button id="closeHandleliste" class="bg-red-600 text-white px-3 py-1 rounded">Lukk</button>
      </div>
    </div>
  </div>

  <!-- Huset med kart -->
  <div class="overlay">
    <h2 class="font-semibold text-lg mb-2">📍 Her ligger kåken</h2>
    <div class="map-container">
      <iframe src="https://www.google.com/maps/embed/v1/place?key=YOUR_GOOGLE_MAPS_API_KEY&q=La+Cala+de+Mijas" allowfullscreen></iframe>
    </div>
    <div class="flex flex-col sm:flex-row gap-2 mt-2">
      <button onclick="copyAddress()" class="bg-blue-500 text-white px-3 py-1 rounded flex-1">Kopier adresse</button>
      <a href="https://maps.app.goo.gl/iRd5qfgutrrJeceP7" target="_blank" class="bg-green-600 text-white px-3 py-1 rounded flex-1 text-center">Åpne kart</a>
    </div>
  </div>

  <!-- Nødnummer -->
  <div class="overlay">
    <h2 class="font-semibold text-lg mb-2">🚨 Nødnummer</h2>
    <a href="tel:112" class="bg-red-600 text-white px-4 py-2 rounded inline-block">Ring 112</a>
  </div>

  <!-- Uber lenke -->
  <div class="overlay">
    <h2 class="font-semibold text-lg mb-2">🚗 Transport</h2>
    <a href="uber://" onclick="setTimeout(()=>{window.location='https://apps.apple.com/app/uber/id368677368';},500)" class="bg-blue-600 text-white px-4 py-2 rounded inline-block">Åpne Uber</a>
  </div>

  <!-- Tidsplan -->
  <div class="overlay">
    <h2 class="font-semibold text-lg mb-2">🕒 Plan</h2>
    <div id="schedule" class="space-y-4"></div>
  </div>
</div>

<script>
// Handleliste logikk med lokal lagring
const handlelisteModal = document.getElementById('handlelisteModal');
const handlelisteBtn = document.getElementById('handlelisteBtn');
const closeHandleliste = document.getElementById('closeHandleliste');
const addItemBtn = document.getElementById('addItemBtn');
const itemInput = document.getElementById('itemInput');
const itemList = document.getElementById('itemList');

function saveItems() {
  const items = [];
  itemList.querySelectorAll('li').forEach(li => {
    const text = li.querySelector('span').innerText;
    items.push(text);
  });
  localStorage.setItem('handleliste', JSON.stringify(items));
}

function loadItems() {
  const items = JSON.parse(localStorage.getItem('handleliste') || '[]');
  items.forEach(text => {
    const li = document.createElement('li');
    li.className = 'flex justify-between items-center p-2 bg-gray-100 dark:bg-gray-700 rounded';
    li.innerHTML = `<span>${text}</span><button class='bg-red-500 text-white px-2 py-1 rounded'>Kjøpt</button>`;
    li.querySelector('button').addEventListener('click', () => {
      li.remove();
      saveItems();
    });
    itemList.appendChild(li);
  });
}

handlelisteBtn.addEventListener('click', () => handlelisteModal.classList.remove('hidden'));
closeHandleliste.addEventListener('click', () => handlelisteModal.classList.add('hidden'));

addItemBtn.addEventListener('click', () => {
  const value = itemInput.value.trim();
  if(value){
    const li = document.createElement('li');
    li.className = 'flex justify-between items-center p-2 bg-gray-100 dark:bg-gray-700 rounded';
    li.innerHTML = `<span>${value}</span><button class='bg-red-500 text-white px-2 py-1 rounded'>Kjøpt</button>`;
    li.querySelector('button').addEventListener('click', () => {
      li.remove();
      saveItems();
    });
    itemList.appendChild(li);
    itemInput.value = '';
    saveItems();
  }
});

itemInput.addEventListener('keypress', e => {
  if(e.key === 'Enter') addItemBtn.click();
});

loadItems();

// Plan data
const scheduleData = [ /* behold alle dager og aktiviteter */ ];

function renderSchedule() {
  const list = document.getElementById("schedule");
  list.innerHTML = '';
  scheduleData.forEach(day => {
    const dayDiv = document.createElement('div');
    dayDiv.className = 'mb-3';

    const dayHeader = document.createElement('h3');
    dayHeader.className = 'font-bold text-xl mb-1 underline';
    dayHeader.innerText = day.day;
    dayDiv.appendChild(dayHeader);

    const ul = document.createElement('ul');
    ul.className = 'space-y-1';

    day.items.forEach(item => {
      const li = document.createElement('li');
      li.className = 'p-2 rounded';
      li.innerHTML = `<strong>${item.time}</strong> - ${item.text}`;
      ul.appendChild(li);
    });

    dayDiv.appendChild(ul);
    list.appendChild(dayDiv);
  });
}

renderSchedule();
setInterval(renderSchedule, 60000);

function copyAddress() {
  const text = 'C. Cártama, 29649 La Cala de Mijas, Málaga, Spania';
  navigator.clipboard.writeText(text);
  alert("Adresse kopiert!");
}
</script>

</body>
</html>
