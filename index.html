<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guttetur Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <style>
    body {
      background-image: url('https://a0.muscache.com/im/pictures/d2290384-93e0-45e1-9a3c-fc1651f4484d.jpg?im_w=1200');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }
    .overlay {
      background: linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.9));
      padding: 1rem;
      border-radius: 1rem;
    }
    .dark .overlay {
      background: linear-gradient(rgba(17,24,39,0.9), rgba(17,24,39,0.9));
    }
  </style>
</head>
<body class="bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-200 transition-colors duration-500">

<div class="max-w-2xl mx-auto mt-4 overlay">

  <div class="flex justify-between items-center mb-4">
    <h1 class="text-3xl font-bold">☀️ Guttetur Hub</h1>
    <div class="flex gap-2">
      <button id="toggleDark" class="bg-gray-300 dark:bg-gray-700 px-3 py-1 rounded">Toggle Dark Mode</button>
      <button id="handlelisteBtn" class="bg-yellow-500 text-white px-3 py-1 rounded">Mat/drikke vi må ha 🛒</button>
    </div>
  </div>

  <!-- Handleliste Popup -->
  <div id="handlelisteModal" class="fixed inset-0 bg-black bg-opacity-50 hidden justify-center items-center">
    <div class="bg-white dark:bg-gray-800 rounded-2xl p-4 max-w-md w-full">
      <h2 class="font-bold text-xl mb-2">Handleliste</h2>
      <div class="flex gap-2 mb-2">
        <input type="text" id="itemInput" class="flex-1 p-2 border rounded" placeholder="Legg til vare" />
        <button id="addItemBtn" class="bg-green-500 text-white px-3 py-1 rounded">Legg til</button>
      </div>
      <ul id="itemList" class="space-y-1 max-h-64 overflow-y-auto"></ul>
      <div class="mt-4 flex justify-end">
        <button id="closeHandleliste" class="bg-red-600 text-white px-3 py-1 rounded">Lukk</button>
      </div>
    </div>
  </div>

  <!-- Adresse -->
  <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow mb-4">
    <h2 class="font-semibold text-lg mb-2">📍 Her ligger kåken</h2>
    <p id="address">https://maps.app.goo.gl/iRd5qfgutrrJeceP7</p>
    <div class="flex gap-2 mt-2">
      <button onclick="copyAddress()" class="bg-blue-500 text-white px-3 py-1 rounded">Kopier</button>
      <a href="https://maps.app.goo.gl/iRd5qfgutrrJeceP7" target="_blank" class="bg-green-600 text-white px-3 py-1 rounded">Åpne kart</a>
    </div>
  </div>

  <!-- Nødnummer -->
  <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow mb-4">
    <h2 class="font-semibold text-lg mb-2">🚨 Nødnummer</h2>
    <a href="tel:112" class="bg-red-600 text-white px-4 py-2 rounded">Ring 112</a>
  </div>

  <!-- Tidsplan -->
  <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow mb-4">
    <h2 class="font-semibold text-lg mb-2">🕒 Plan</h2>
    <div id="schedule" class="space-y-4"></div>
  </div>

</div>

<script>
// Handleliste logikk
const handlelisteModal = document.getElementById('handlelisteModal');
const handlelisteBtn = document.getElementById('handlelisteBtn');
const closeHandleliste = document.getElementById('closeHandleliste');
const addItemBtn = document.getElementById('addItemBtn');
const itemInput = document.getElementById('itemInput');
const itemList = document.getElementById('itemList');

handlelisteBtn.addEventListener('click', () => handlelisteModal.classList.remove('hidden'));
closeHandleliste.addEventListener('click', () => handlelisteModal.classList.add('hidden'));

addItemBtn.addEventListener('click', () => {
  const value = itemInput.value.trim();
  if(value){
    const li = document.createElement('li');
    li.className = 'flex justify-between items-center p-2 bg-gray-100 dark:bg-gray-700 rounded';
    li.innerHTML = `<span>${value}</span><button class='bg-red-500 text-white px-2 py-1 rounded'>Kjøpt</button>`;
    li.querySelector('button').addEventListener('click', () => li.remove());
    itemList.appendChild(li);
    itemInput.value = '';
  }
});

itemInput.addEventListener('keypress', e => {
  if(e.key === 'Enter') addItemBtn.click();
});

// Dark mode toggle
document.getElementById('toggleDark').addEventListener('click', () => {
  document.body.classList.toggle('dark');
});

// Plan data
const scheduleData = [
  { day: "Torsdag 30.04.26", items: [
    { time: "11:30", text: "Avreise BGO ✈️" },
    { time: "15:30", text: "Ankomst AGP" },
    { time: "15:45", text: "Privatsjåfør (Kollektiv Midtlivskrise)" },
    { time: "16:15", text: "Ankomst La Cala" },
    { time: "20:30", text: "Middag: <a href='https://maps.google.com/?q=C.+C%C3%A1rtama,+29649+La+Cala+de+Mijas' target='_blank' class='text-blue-500 underline'>Taberna Casa Pino</a>" }
  ]},
  { day: "Fredag 01.05.26", items: [
    { time: "10:00", text: "Padel 2t: <a href='https://maps.google.com/?q=C.+Libra,+11,+29649+Las+Lagunas+de+Mijas' target='_blank' class='text-blue-500 underline'>Riviera11 Sports Club</a>" },
    { time: "12:00-18:00", text: "Byvandring, egentid og basseng" },
    { time: "20:00", text: "Middag: <a href='https://maps.google.com/?q=C.+Butiplaya,+5,+29649+La+Cala+de+Mijas' target='_blank' class='text-blue-500 underline'>El Olivo</a>" }
  ]},
  { day: "Lørdag 02.05.26", items: [
    { time: "11:00-13:00", text: "Padelturnering: <a href='https://maps.google.com/?q=C.+Libra,+11,+29649+Las+Lagunas+de+Mijas' target='_blank' class='text-blue-500 underline'>Riviera11 Sports Club</a>" },
    { time: "13:00", text: "BBQ lunch på Riviera11" },
    { time: "14:00-20:00", text: "Byvandring, strand og basseng" },
    { time: "20:00", text: "Middag: <a href='https://maps.google.com/?q=C.+Torrox,+18,+29649+La+Cala+de+Mijas' target='_blank' class='text-blue-500 underline'>Cyrano</a>" }
  ]},
  { day: "Søndag 03.05.26", items: [
    { time: "11:00", text: "Tur langs Sendero Litoral" },
    { time: "15:00", text: "Lunch: Capobino" },
    { time: "17:00", text: "Uber til huset eller Marbella" },
    { time: "20:00", text: "Middag: <a href='https://maps.google.com/?q=C.+Torremolinos,+3,+29649+La+Cala+de+Mijas' target='_blank' class='text-blue-500 underline'>Sai Indian Restaurant</a>" }
  ]},
  { day: "Mandag 04.05.26", items: [
    { time: "10:00", text: "Padel 2t: <a href='https://maps.google.com/?q=C.+Libra,+11,+29649+Las+Lagunas+de+Mijas' target='_blank' class='text-blue-500 underline'>Riviera11 Sports Club</a>" },
    { time: "12:00-20:00", text: "Avslapping rundt hus" }
  ]},
  { day: "Tirsdag 05.05.26", items: [
    { time: "10:00-18:30", text: "Chill og pakking" },
    { time: "18:30", text: "Transport til AGP" },
    { time: "20:05", text: "Avgang AGP" },
    { time: "23:55", text: "Ankomst BGO" }
  ]},
  { day: "Onsdag 06.05.26", items: [
    { time: "10:00", text: "Fyllesyk 🤕" }
  ]}
];

function renderSchedule() {
  const list = document.getElementById("schedule");
  list.innerHTML = '';

  scheduleData.forEach(day => {
    const dayDiv = document.createElement('div');
    dayDiv.className = 'mb-3';

    const dayHeader = document.createElement('h3');
    dayHeader.className = 'font-bold text-xl mb-1 underline';
    dayHeader.innerText = day.day;
    dayDiv.appendChild(dayHeader);

    const ul = document.createElement('ul');
    ul.className = 'space-y-1';

    day.items.forEach(item => {
      const li = document.createElement('li');
      li.className = 'p-2 rounded';
      li.innerHTML = `<strong>${item.time}</strong> - ${item.text}`;
      ul.appendChild(li);
    });

    dayDiv.appendChild(ul);
    list.appendChild(dayDiv);
  });
}

renderSchedule();
setInterval(renderSchedule, 60000);

function copyAddress() {
  const text = document.getElementById("address").innerText;
  navigator.clipboard.writeText(text);
  alert("Adresse kopiert!");
}
</script>

</body>
</html>
