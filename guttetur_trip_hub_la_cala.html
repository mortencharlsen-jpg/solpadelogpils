<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sol - Padel - Pils</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #f3f4f6;
      color: #1f2937;
      transition: all 0.3s;
    }
    .header-bg {
      background-image: url('https://a0.muscache.com/im/pictures/d2290384-93e0-45e1-9a3c-fc1651f4484d.jpg?im_w=1200');
      background-size: cover;
      background-position: center;
      padding: 1rem;
      border-radius: 1rem;
      color: white;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      text-align: center;
    }
    #handlelisteBtn {
      background-color: #1E40AF;
      color: white;
    }
    .overlay {
      background: rgba(255,255,255,0.9);
      padding: 1rem;
      border-radius: 1rem;
      margin-bottom: 1rem;
    }
    .map-container {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      border-radius: 1rem;
      overflow: hidden;
      margin-bottom: 0.5rem;
      background-image: url('https://media.wired.com/photos/59269cd37034dc5f91bec0f1/3:2/w_2560%2Cc_limit/GoogleMapTA.jpg');
      background-size: cover;
      background-position: center;
    }
    .flex-center {
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
      text-align: center;
    }
    /* Handleliste styling */
    #handlelisteModal {
      position: fixed;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
      background-color: rgba(0,0,0,0.5);
      z-index: 50;
    }
    #handlelisteModal.active {
      display: flex;
    }
    #handlelisteContent {
      background-color: white;
      border-radius: 1rem;
      padding: 1rem;
      max-width: 400px;
      width: 90%;
      max-height: 80%;
      overflow-y: auto;
      position: relative;
    }
    #closeHandleliste {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background-color: #ef4444;
      color: white;
      border: none;
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="max-w-2xl mx-auto mt-4">
  <div class="header-bg">
    <h1 class="text-3xl font-bold">☀️ Sol - Padel - Pils</h1>
    <button id="handlelisteBtn" class="px-3 py-2 rounded w-full">Mat/drikke vi må ha 🛒</button>
  </div>

  <!-- Handleliste Popup -->
  <div id="handlelisteModal">
    <div id="handlelisteContent">
      <button id="closeHandleliste">Lukk ✖</button>
      <h2 class="font-bold text-xl mb-2">Handleliste</h2>
      <div class="flex gap-2 mb-2">
        <input type="text" id="itemInput" class="flex-1 p-2 border rounded" placeholder="Legg til vare" />
        <button id="addItemBtn" class="bg-green-500 text-white px-3 py-1 rounded">Legg til</button>
      </div>
      <ul id="itemList" class="space-y-1 max-h-64 overflow-y-auto"></ul>
    </div>
  </div>

  <!-- Huset med kartbilde -->
  <div class="overlay">
    <h2 class="font-semibold text-lg mb-2">📍 Her ligger kåken</h2>
    <div class="map-container"></div>
    <div class="flex flex-col sm:flex-row gap-2 mt-2">
      <button onclick="copyAddress()" class="bg-blue-500 text-white px-3 py-1 rounded flex-1">Kopier adresse</button>
      <a href="https://maps.app.goo.gl/iRd5qfgutrrJeceP7" target="_blank" class="bg-green-600 text-white px-3 py-1 rounded flex-1 text-center">Åpne kart</a>
    </div>
  </div>

  <!-- Nødnummer og Transport side-by-side -->
  <div class="overlay flex-center">
    <div>
      <h2 class="font-semibold text-lg mb-2">🚨 Nødnummer</h2>
      <a href="tel:112" class="bg-red-600 text-white px-4 py-2 rounded inline-block">Ring 112</a>
    </div>
    <div>
      <h2 class="font-semibold text-lg mb-2">🚗 Transport</h2>
      <a href="uber://" onclick="setTimeout(()=>{window.location='https://apps.apple.com/app/uber/id368677368';},500)" class="bg-blue-600 text-white px-4 py-2 rounded inline-block">Åpne Uber</a>
    </div>
  </div>

  <!-- Tidsplan -->
  <div class="overlay">
    <h2 class="font-semibold text-lg mb-2">🕒 Plan</h2>
    <div id="schedule" class="space-y-4"></div>
  </div>
</div>

<script>
// Handleliste med lokal lagring
const handlelisteModal = document.getElementById('handlelisteModal');
const handlelisteBtn = document.getElementById('handlelisteBtn');
const closeHandleliste = document.getElementById('closeHandleliste');
const addItemBtn = document.getElementById('addItemBtn');
const itemInput = document.getElementById('itemInput');
const itemList = document.getElementById('itemList');

function saveItems() {
  const items = [];
  itemList.querySelectorAll('li').forEach(li => {
    const text = li.querySelector('span').innerText;
    items.push(text);
  });
  localStorage.setItem('handleliste', JSON.stringify(items));
}

function loadItems() {
  const items = JSON.parse(localStorage.getItem('handleliste') || '[]');
  items.forEach(text => {
    const li = document.createElement('li');
    li.className = 'flex justify-between items-center p-2 bg-gray-100 rounded';
    li.innerHTML = `<span>${text}</span><button class='bg-red-500 text-white px-2 py-1 rounded'>Kjøpt</button>`;
    li.querySelector('button').addEventListener('click', () => {
      li.remove();
      saveItems();
    });
    itemList.appendChild(li);
  });
}

handlelisteBtn.addEventListener('click', () => handlelisteModal.classList.add('active'));
closeHandleliste.addEventListener('click', () => handlelisteModal.classList.remove('active'));
addItemBtn.addEventListener('click', () => {
  const value = itemInput.value.trim();
  if(value){
    const li = document.createElement('li');
    li.className = 'flex justify-between items-center p-2 bg-gray-100 rounded';
    li.innerHTML = `<span>${value}</span><button class='bg-red-500 text-white px-2 py-1 rounded'>Kjøpt</button>`;
    li.querySelector('button').addEventListener('click', () => {
      li.remove();
      saveItems();
    });
    itemList.appendChild(li);
    itemInput.value = '';
    saveItems();
    handlelisteModal.classList.add('active');
  }
});
itemInput.addEventListener('keypress', e => { if(e.key === 'Enter') addItemBtn.click(); });
loadItems();

function copyAddress() {
  const text = 'C. Cártama, 29649 La Cala de Mijas, Málaga, Spania';
  navigator.clipboard.writeText(text);
  alert("Adresse kopiert!");
}

// Tidsplan med Tripadvisor-lenker
const scheduleData = [
  { day: "Torsdag 30.04.26", items: [
    { time: "11:30", text: "Avreise BGO ✈️" },
    { time: "15:30", text: "Ankomst AGP" },
    { time: "15:45", text: "Privatsjåfør (Kollektiv Midtlivskrise)" },
    { time: "16:15", text: "Ankomst La Cala" },
    { time: "20:30", text: `Middag: Taberna Casa Pino (<a href='https://www.tripadvisor.com/Restaurant_Review-g315953-d15845505-Reviews-Taberna_Casa_Pino-La_Cala_de_Mijas_Costa_del_Sol_Andalucia.html' target='_blank' class='text-blue-500 underline'>Tripadvisor</a>)` }
  ]},
  { day: "Fredag 01.05.26", items: [
    { time: "10:00", text: `Padel 2t: <a href='https://maps.google.com/?q=C.+Libra,+11,+29649+Las+Lagunas+de+Mijas' target='_blank' class='text-blue-500 underline'>Riviera11 Sports Club</a>` },
    { time: "12:00-18:00", text: "Byvandring, egentid og basseng" },
    { time: "20:00", text: `Middag: El Olivo (<a href='https://www.tripadvisor.com/Restaurant_Review-g315953-d15378205-Reviews-El_Olivo-La_Cala_de_Mijas_Costa_del_Sol_Andalucia.html' target='_blank' class='text-blue-500 underline'>Tripadvisor</a>)` }
  ]},
  { day: "Lørdag 02.05.26", items: [
    { time: "11:00-13:00", text: `Padelturnering: <a href='https://maps.google.com/?q=C.+Libra,+11,+29649+Las+Lagunas+de+Mijas' target='_blank' class='text-blue-500 underline'>Riviera11 Sports Club</a>` },
    { time: "13:00", text: "BBQ lunch på Riviera11" },
    { time: "14:00-20:00", text: "Byvandring, strand og basseng" },
    { time: "20:00", text: `Middag: Cyrano (<a href='https://www.tripadvisor.com/Restaurant_Review-g315953-d15643089-Reviews-Cyrano-La_Cala_de_Mijas_Costa_del_Sol_Andalucia.html' target='_blank' class='text-blue-500 underline'>Tripadvisor</a>)` }
  ]},
  { day: "Søndag 03.05.26", items: [
    { time: "11:00", text: "Tur langs Sendero Litoral" },
    { time: "15:00", text: "Lunch: Capobino" },
    { time: "17:00", text: "Uber til huset eller Marbella" },
    { time: "20:00", text: `Middag: Sai Indian Restaurant (<a href='https://www.tripadvisor.com/Restaurant_Review-g315953-d15795352-Reviews-Sai_Indian_Restaurant-La_Cala_de_Mijas_Costa_del_Sol_Andalucia.html' target='_blank' class='text-blue-500 underline'>Tripadvisor</a>)` }
  ]},
  { day: "Mandag 04.05.26", items: [
    { time: "10:00", text: `Padel 2t: <a href='https://maps.google.com/?q=C.+Libra,+11,+29649+Las+Lagunas+de+Mijas' target='_blank' class='text-blue-500 underline'>Riviera11 Sports Club</a>` },
    { time: "12:00-20:00", text: "Avslapping rundt hus" }
  ]},
  { day: "Tirsdag 05.05.26", items: [
    { time: "10:00-18:30", text: "Chill og pakking" },
    { time: "18:30", text: "Transport til AGP" },
    { time: "20:05", text: "Avgang AGP" },
    { time: "23:55", text: "Ankomst BGO" }
  ]},
  { day: "Onsdag 06.05.26", items: [
    { time: "10:00", text: "Fyllesyk 🤕" }
  ]}
];

function renderSchedule() {
  const list = document.getElementById("schedule");
  list.innerHTML = '';
  scheduleData.forEach(day => {
    const dayDiv = document.createElement('div');
    dayDiv.className = 'mb-3';

    const dayHeader = document.createElement('h3');
    dayHeader.className = 'font-bold text-xl mb-1 underline';
    dayHeader.innerText = day.day;
    dayDiv.appendChild(dayHeader);

    const ul = document.createElement('ul');
    ul.className = 'space-y-1';

    day.items.forEach(item => {
      const li = document.createElement('li');
      li.className = 'p-2 rounded';
      li.innerHTML = `<strong>${item.time}</strong> - ${item.text}`;
      ul.appendChild(li);
    });

    dayDiv.appendChild(ul);
    list.appendChild(dayDiv);
  });
}

renderSchedule();
setInterval(renderSchedule, 60000);
</script>

</body>
</html>
